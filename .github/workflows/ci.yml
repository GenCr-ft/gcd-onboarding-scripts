name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  unit-tests:
    name: Shell Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run onboarding logic tests
        run: bash tests/test_onboarding_logic.sh
        timeout-minutes: 10

      - name: Run package manager detection tests
        run: bash tests/test_package_manager_detection.sh
        timeout-minutes: 10

      - name: Run full test suite
        run: bash test.sh
        timeout-minutes: 10

  shellcheck:
    name: ShellCheck Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y shellcheck

      - name: Run shellcheck on all shell scripts
        run: find . -name "*.sh" -not -path "./.git/*" | xargs shellcheck

  ssot-compliance:
    name: SSoT Compliance Check
    uses: GenCr-ft/gcd-shared-actions/.github/workflows/reusable-ssot-linter.yml@v1.2.5
    secrets:
      CROSS_REPO_PAT: ${{ secrets.CROSS_REPO_PAT }}
    with:
      continue-on-error: true
      governance-version: "v1.4.0"
      tooling-version: "v4.1.2"
