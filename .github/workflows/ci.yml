name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Restrict GITHUB_TOKEN to read-only. Self-hosted runner risk is low: private
# org repo — only org members with write access can open PRs.
permissions:
  contents: read

jobs:
  unit-tests:
    name: Shell Unit Tests
    runs-on: [self-hosted, linux, x64]
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run full test suite
        run: bash test.sh
        timeout-minutes: 10

  shellcheck:
    name: ShellCheck Lint
    runs-on: [self-hosted, linux, x64]
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run shellcheck on all shell scripts
        run: find . -name "*.sh" -not -path "./.git/*" | xargs -r shellcheck --severity=error

  ssot-compliance:
    name: SSoT Compliance Check
    uses: GenCr-ft/gcd-shared-actions/.github/workflows/reusable-ssot-linter.yml@v1.2.5
    secrets:
      CROSS_REPO_PAT: ${{ secrets.CROSS_REPO_PAT }}
    with:
      continue-on-error: true
      governance-version: "v1.4.0"
      tooling-version: "v4.1.2"
