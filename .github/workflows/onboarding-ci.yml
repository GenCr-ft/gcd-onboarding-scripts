name: Onboarding Script CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Restrict GITHUB_TOKEN to read-only. Self-hosted runner risk is low: private
# org repo — only org members with write access can open PRs.
permissions:
  contents: read

jobs:
  validate-scripts:
    name: Validate Bash Scripts
    runs-on: [self-hosted, linux, x64]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4

      - name: ShellCheck
        run: find . -name "*.sh" -exec shellcheck --severity=error {} +

  dry-run-onboarding:
    name: Dry Run Onboarding (Linux)
    runs-on: [self-hosted, linux, x64]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          TEST_HOME=$(mktemp -d)
          echo "HOME=$TEST_HOME" >> "$GITHUB_ENV"
          mkdir -p "$TEST_HOME/.agents/skills"

      - name: Dry Run Orchestrator
        run: |
          bash -n gft-onboarding.sh
          find includes -name "*.sh" -exec bash -n {} +

      - name: Verify Agent Bootstrap Logic
        run: |
          export SCRIPT_DIR="$(pwd)"
          source includes/01_helpers.sh
          source includes/05_agent_bootstrap.sh
          log_info() { echo "[INFO] $1"; }
          log_success() { echo "[SUCCESS] $1"; }
          log_warn() { echo "[WARN] $1"; }
          mkdir -p skills
          touch skills/test-skill.skill
          setup_agent_skills
          if [[ -d "$HOME/.agents/skills/test-skill" ]]; then
            echo "Skill deployment verified."
          else
            echo "Skill deployment failed."
            exit 1
          fi
