# gitleaks configuration — GenCr@ft Studio
# Ref: gcs-core-governance/domains/security/.gitleaks.toml
[extend]
useDefault = true

[allowlist]
description = "Test fixtures and example values"
paths = [
    '''(^|/)tests?/''',
    '''(^|/)integration_test_docs/''',
    '''(^|/)test[-_]keys?/''',
    '''(^|/)fixtures?/''',
    '''(^|/)\.secrets\.baseline$''',
]
