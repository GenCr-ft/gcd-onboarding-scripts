# SSoT: gcs-devops-standards/tooling/configs/.pre-commit-config.yaml
# Version: 2.3 (Adds dependency for commitlint hook)

repos:
  # ===== Generic File Checks =====
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-added-large-files
        args: ['--maxkb=1024']
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-json
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable

  # ===== Commit Message Validation (via a compatible remote hook) =====
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v6.0.0
    hooks:
    - id: commitlint
      stages: [commit-msg]
      # THIS IS THE FIX:
      # We explicitly tell pre-commit to install this package into the hook's isolated environment.
      additional_dependencies:
        - "@commitlint/config-conventional"

  # ===== Markdown Linting =====
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.41.0
    hooks:
      - id: markdownlint
        args: ["--config", ".markdownlint.yaml"]
